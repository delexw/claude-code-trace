[default]
description = "Default permissions for all claude-code-trace commands"
permissions = [
  "allow-discover-sessions",
  "allow-load-session",
  "allow-load-message",
  "allow-get-session-meta",
  "allow-watch-session",
  "allow-unwatch-session",
  "allow-get-git-info",
  "allow-get-debug-log",
  "allow-watch-picker",
  "allow-unwatch-picker",
  "allow-get-project-dirs",
  "allow-get-settings",
  "allow-set-projects-dir",
  "allow-list-wsl-distros",
  "allow-set-wsl-distros",
  "allow-switch-to-browser",
  "allow-focus-session-window",
]

[[permission]]
identifier = "allow-discover-sessions"
description = "Allow discovering sessions across project directories"
commands.allow = ["discover_sessions"]

[[permission]]
identifier = "allow-load-session"
description = "Allow loading a session file"
commands.allow = ["load_session"]

[[permission]]
identifier = "allow-load-message"
description = "Allow loading a single full (heavy-body) message by index"
commands.allow = ["load_message"]

[[permission]]
identifier = "allow-get-session-meta"
description = "Allow getting session metadata"
commands.allow = ["get_session_meta"]

[[permission]]
identifier = "allow-watch-session"
description = "Allow watching a session file for changes"
commands.allow = ["watch_session"]

[[permission]]
identifier = "allow-unwatch-session"
description = "Allow stopping session file watching"
commands.allow = ["unwatch_session"]

[[permission]]
identifier = "allow-get-git-info"
description = "Allow getting git information"
commands.allow = ["get_git_info"]

[[permission]]
identifier = "allow-get-debug-log"
description = "Allow reading debug log"
commands.allow = ["get_debug_log"]

[[permission]]
identifier = "allow-watch-picker"
description = "Allow watching picker for changes"
commands.allow = ["watch_picker"]

[[permission]]
identifier = "allow-unwatch-picker"
description = "Allow stopping picker watching"
commands.allow = ["unwatch_picker"]

[[permission]]
identifier = "allow-get-project-dirs"
description = "Allow getting project directories"
commands.allow = ["get_project_dirs"]

[[permission]]
identifier = "allow-get-settings"
description = "Allow reading app settings"
commands.allow = ["get_settings"]

[[permission]]
identifier = "allow-set-projects-dir"
description = "Allow setting the projects directory"
commands.allow = ["set_projects_dir"]

[[permission]]
identifier = "allow-list-wsl-distros"
description = "Allow listing installed WSL distributions"
commands.allow = ["list_wsl_distros"]

[[permission]]
identifier = "allow-set-wsl-distros"
description = "Allow setting the WSL distributions to discover"
commands.allow = ["set_wsl_distros"]

[[permission]]
identifier = "allow-switch-to-browser"
description = "Allow switching to browser mode"
commands.allow = ["switch_to_browser"]

[[permission]]
identifier = "allow-focus-session-window"
description = "Allow focusing a live session's terminal window"
commands.allow = ["focus_session_window"]
