name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tui-py/requirements.txt

      - name: Install dependencies
        run: npm ci

      - name: Install Python TUI dependencies
        run: pip install -r tui-py/requirements.txt

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: JS/TS lint
        run: npx oxlint

      - name: JS/TS format check
        run: npx oxfmt --check

      - name: Frontend tests
        run: npx vitest run

      - name: Rust format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Rust lint
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Python TUI lint
        run: ruff check tui-py

      - name: Python TUI format check
        run: ruff format --check tui-py

      - name: Python TUI tests
        run: pytest
        working-directory: tui-py
