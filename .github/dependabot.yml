version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      dev-dependencies:
        dependency-type: development
      production-dependencies:
        dependency-type: production

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    groups:
      tauri:
        patterns:
          - "tauri*"
      tower:
        patterns:
          - "tower*"

  - package-ecosystem: pip
    directory: /tui-py
    schedule:
      interval: weekly
    groups:
      testing:
        patterns:
          - "pytest*"
      dev-tools:
        patterns:
          - "ruff"
      runtime:
        patterns:
          - "textual"
          - "httpx"
