version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      dev-dependencies:
        dependency-type: development
      production-dependencies:
        dependency-type: production

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /tui-py
    schedule:
      interval: weekly
