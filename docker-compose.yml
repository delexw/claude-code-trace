services:
  cctrace:
    build:
      context: .
      dockerfile: Dockerfile
    image: claude-code-trace:latest
    container_name: claude-code-trace
    restart: unless-stopped
    ports:
      # Host:Container. Change the host port to expose elsewhere.
      - "${CCTRACE_HOST_PORT:-1421}:1421"
    environment:
      # Override these if you change the container-side port.
      CCTRACE_HTTP_HOST: 0.0.0.0
      CCTRACE_HTTP_PORT: 1421
      CCTRACE_STATIC_DIR: /app/dist
    volumes:
      # Claude Code writes sessions to ~/.claude/projects on the host.
      # Mount read-only — the app never needs to write here.
      - "${CLAUDE_HOME:-${HOME}/.claude}:/home/app/.claude:ro"
      # Persist settings.json (projects dir, WSL distros, allowed CORS
      # origins) across container recreation — without this it only lives in
      # the container's writable layer and resets to {} on every recreate.
      - cctrace-config:/home/app/.config
    healthcheck:
      # CMD-SHELL always runs via /bin/sh, which on this image is dash and
      # doesn't support the /dev/tcp redirect below — invoke bash explicitly.
      test: ["CMD", "/bin/bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/1421"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  cctrace-config:
